# Nginx reverse proxy for ORBIS FINAI
server {
    listen 80;
    server_name finans.erkanerdem.online;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name finans.erkanerdem.online;

    ssl_certificate     /etc/letsencrypt/live/finans.erkanerdem.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/finans.erkanerdem.online/privkey.pem;

    # Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3009;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API
    location /api/ {
        proxy_pass http://127.0.0.1:8012;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Allow large request bodies
    client_max_body_size 10M;
}
