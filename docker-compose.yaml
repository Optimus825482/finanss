version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: orbis_finai_db
    environment:
      POSTGRES_DB: orbis_finai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 518518Erkan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: orbis_finai_api
    environment:
      DATABASE_URL: postgresql://postgres:518518Erkan@db:5432/orbis_finai
      NVIDIA_API_KEY: ${NVIDIA_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "8012:8012"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://finans.erkanerdem.online
    container_name: orbis_finai_web
    ports:
      - "3009:3000"
    restart: unless-stopped

volumes:
  pgdata:
