name: CI
on: [push, pull_request]
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Backend lint
        working-directory: backend
        run: |
          pip install ruff
          ruff check .
      - name: Frontend lint
        working-directory: frontend
        run: |
          npm ci
          npm run lint
